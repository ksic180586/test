<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carré draggable</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }

#arena {
  position: relative;
  width: 360px;
  height: 420px;
  background: #e8e8e8;
  border-radius: 12px;
  border: 1px solid #ccc;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

#box {
  position: absolute;
  width: 72px;
  height: 72px;
  background: #534AB7;
  border-radius: 8px;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: none;
}

#box.dragging {
  cursor: grabbing;
  background: #7F77DD;
}

#coords {
  position: absolute;
  top: 12px;
  left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: #888;
  font-family: monospace;
  pointer-events: none;
}

#hint {
  position: absolute;
  bottom: 14px;
  left: 0; right: 0;
  text-align: center;
  font-size: 13px;
  color: #aaa;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="arena">
  <div id="coords">x: 0   y: 0</div>
  <div id="box">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M14 4 L24 14 L14 24 L4 14 Z" fill="white" opacity="0.7"/>
    </svg>
  </div>
  <div id="hint">glisse le carré</div>
</div>

<script>
const arena = document.getElementById('arena');
const box = document.getElementById('box');
const coords = document.getElementById('coords');

const SIDE = 72;
let arenaW, arenaH;

function measure() {
  const r = arena.getBoundingClientRect();
  arenaW = r.width;
  arenaH = r.height;
}

measure();

let px = arenaW / 2 - SIDE / 2;
let py = arenaH / 2 - SIDE / 2;
let offsetX = 0, offsetY = 0;
let active = false;

function place(x, y) {
  px = Math.max(0, Math.min(arenaW - SIDE, x));
  py = Math.max(0, Math.min(arenaH - SIDE, y));
  box.style.left = px + 'px';
  box.style.top = py + 'px';
  coords.textContent = 'x: ' + Math.round(px) + '   y: ' + Math.round(py);
}

place(px, py);

function getPos(e) {
  if (e.touches) {
    const t = e.touches[0];
    const r = arena.getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  const r = arena.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function startDrag(e) {
  measure();
  active = true;
  box.classList.add('dragging');
  const p = getPos(e);
  offsetX = p.x - px;
  offsetY = p.y - py;
  e.preventDefault();
}

function moveDrag(e) {
  if (!active) return;
  const p = getPos(e);
  place(p.x - offsetX, p.y - offsetY);
  e.preventDefault();
}

function endDrag() {
  active = false;
  box.classList.remove('dragging');
}

box.addEventListener('touchstart', startDrag, { passive: false });
box.addEventListener('mousedown', startDrag);
window.addEventListener('touchmove', moveDrag, { passive: false });
window.addEventListener('mousemove', moveDrag);
window.addEventListener('touchend', endDrag);
window.addEventListener('mouseup', endDrag);
window.addEventListener('resize', () => { measure(); place(px, py); });
</script>

</body>
</html>
